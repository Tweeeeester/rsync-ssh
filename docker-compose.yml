services:
  rsync-ssh:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "[ -f /tmp/last-sync ] && [ $(( $(date +%s) - $(cat /tmp/last-sync) )) -lt 7200 ]"]
      interval: 5m
      timeout: 10s
      start_period: 90s
      retries: 2
    env_file: .env
    volumes:
      # SSH private key — mount to staging path; entrypoint copies it to /root/.ssh/
      # with correct ownership so SSH accepts it (bind-mounted files keep host UID).
      - ~/.ssh/id_ed25519:/run/ssh/id_rsa:ro

      # Sync pairs config (read-only)
      - ./sync-pairs.txt:/config/sync-pairs.txt:ro

      # Source folders to sync — add one volume per source path in sync-pairs.txt
      # Example:
      #   - /host/path/to/photos:/data/photos
      #   - /host/path/to/documents:/data/documents
